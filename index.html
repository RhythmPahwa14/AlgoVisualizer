<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/black%20favicon.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="/white%20favicon.png" media="(prefers-color-scheme: dark)" />
  <link id="dynamic-favicon" rel="icon" type="image/png" href="/black%20favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoVisualizer - Algorithm Visualization Tool</title>

  <script>
    (function () {
      var media = window.matchMedia('(prefers-color-scheme: dark)');
      var applyFavicon = function () {
        var favicon = document.getElementById('dynamic-favicon');
        if (!favicon) return;
        favicon.setAttribute('href', media.matches ? '/white%20favicon.png' : '/black%20favicon.png');
      };
      applyFavicon();
      if (media.addEventListener) {
        media.addEventListener('change', applyFavicon);
      } else if (media.addListener) {
        media.addListener(applyFavicon);
      }
    })();
  </script>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Lordicon Animations -->
  <script src="https://cdn.lordicon.com/lordicon.js" defer></script>

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />

  <!-- AOS (Animate on Scroll) library -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
  <div id="root"></div>

  <!-- Main App Script -->
  <script type="module" src="/src/main.jsx" defer></script>

  <!-- AOS JavaScript file -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
</body>
</html>
